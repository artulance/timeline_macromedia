<div id="header">
    <h1>Macromedia Director: Cronología (1985–2013)</h1>
    <p>15 hitos clave en la historia del software que definió la multimedia interactiva</p>
</div>

                "headline": "Macromedia Director",

                    "url": "https://static.wikia.nocookie.net/macromedia/images/d/dd/MacroMind_VideoWorks_II_cover.png/revision/latest?cb=20200108193705",

                    "url": "https://upload.wikimedia.org/wikipedia/commons/d/d2/Macromind_Logo_2013-04-04_03-23.jpg",

                },

                    "headline": "Director 7 y 8: salto al 3D",
                    "text": "<p>Director introduce <strong>Shockwave 3D</strong>, permitiendo gráficos tridimensionales interactivos dentro de sus proyectos.</p><p>Se convierte en una plataforma clave para <strong>juegos web</strong> y experiencias 3D antes de la llegada de Unity. El soporte 3D representó un salto cualitativo enorme, convirtiendo a Director en una de las primeras herramientas de autoría capaces de combinar 2D, 3D, audio y vídeo en un mismo proyecto interactivo.</p>"

                    "headline": "Adobe anuncia el fin de Director",
                    "text": "<p>Adobe comunica oficialmente el <strong>fin del desarrollo y soporte</strong> de Director.</p><p>Su legado, sin embargo, permanece vivo en múltiples ámbitos: la <strong>Web interactiva</strong>, los <strong>lenguajes de scripting accesibles</strong>, los <strong>motores multimedia</strong>, la <strong>cultura del CD-ROM</strong> y la <strong>lógica de timeline</strong> que hoy utilizan herramientas como After Effects, Flash/Animate, Unity y muchas otras.</p><p>Director fue, durante casi tres décadas, una pieza fundamental en la evolución de la cultura digital y la producción multimedia.</p>"
